<body>
    <script>
        function readNumber(){
            this.number
            do {
                this.number = prompt("Введите число: ", 0);
            } while (!isFinite(this.number));
            if (this.number === null || this.number === '') return null; 
            
            return this.number;
            };
            
       
        alert( readNumber())
    </script>
