<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function Calculator() {
            this.read = function () {
                this.a = +prompt('a:');
                this.b = +prompt('b:');
            };
            this.sum = function () {
                alert(this.a + this.b);
                return this.a + this.b;
            };
            this.mul = function () {
                alert(this.a * this.b);
                return this.a * this.b;
            }
        };
        let calculator = new Calculator();
            calculator.read();

        alert( "Sum=" + calculator.sum() );
        alert( "Mul=" + calculator.mul() );
    </script>
</body>
</html>
