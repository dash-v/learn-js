<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let calculator = {
            read () {
                this.a = +prompt('a:');
                this.b = +prompt('b:');
            },
            sum () {
                alert(this.a + this.b);
                return this.a + this.b;
            },
            mul () {
                alert(this.a * this.b);
                return this.a * this.b;
            }

            };
            
            calculator.read();
            alert( calculator.sum() );
            alert( calculator.mul() );
    </script>
</body>
</html>
