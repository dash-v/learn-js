<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        
        function pow(x,n){
            return x**n
        }
        let x = prompt("x?");
        let n = prompt("n?");
        if (n >= 1 && n % 1 == 0) {
            alert( pow(x, n) );
            } else {
            alert(`Степень ${n} не поддерживается, используйте натуральное число`);
        }
    </script>
    
</body>
</html>
