<body>
    <script>
        
        let n = prompt("Введите n:");
        for (let i = 2; i <= n; i++) {
            let j = 2;
            for (; i < j && i % j != 0; j++);
            
            if (i == j) {
                alert(i);
            }
        } 
    </script>
